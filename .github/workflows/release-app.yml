name: Release desktop app

# Every push to main that touches the desktop app cuts a fresh version
# (`app/v0.1.<commits touching apps/executor-desktop/>`) and builds bundles for
# macOS (Apple Silicon + Intel), Linux, and Windows into a GitHub Release.
#
# The tag is pushed and the bundles uploaded in the SAME run — a tag pushed by the
# default GITHUB_TOKEN wouldn't re-trigger a separate "on: tag" workflow, so tagging
# and building live together here. Want releases less often? Change the trigger to
# `push: tags: ['app/v*']` and tag by hand instead.

on:
  push:
    branches: [main]
    paths:
      - "apps/executor-desktop/**"
  # Editing this workflow deliberately does NOT trigger a (heavy, 4-platform) release;
  # use the manual button below to cut one on demand, or push an app change.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-app
  cancel-in-progress: false

env:
  INITIAL_MAJOR_MINOR: "0.1"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      new: ${{ steps.v.outputs.new }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve + push tag
        id: v
        shell: bash
        run: |
          set -euo pipefail
          LATEST=$(git tag --list 'app/v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LATEST" ] && MM=$(echo "$LATEST" | sed -nE 's|^app/v([0-9]+\.[0-9]+)(\..*)?$|\1|p') && [ -n "$MM" ]; then
            MAJOR_MINOR="$MM"
          else
            MAJOR_MINOR='${{ env.INITIAL_MAJOR_MINOR }}'
          fi
          COUNT=$(git rev-list --count HEAD -- apps/executor-desktop/)
          TAG="app/v${MAJOR_MINOR}.${COUNT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::notice::tag ${TAG} exists; skipping build"
            echo "new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${TAG}" -m "Auto-tag desktop app at ${GITHUB_SHA}"
          git push origin "${TAG}"
          echo "new=true" >> "$GITHUB_OUTPUT"
          echo "::notice::pushed ${TAG}"

  build:
    needs: version
    if: needs.version.outputs.new == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/executor-desktop/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend deps
        working-directory: apps/executor-desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/executor-desktop
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "Keyward Executor ${{ needs.version.outputs.tag }}"
          releaseBody: "Automated build of the Keyward Executor desktop app. Unsigned — on first launch macOS/Windows may warn; open it from the context menu / Defender 'Run anyway'."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
