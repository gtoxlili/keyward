name: Publish server image

# Build the keyward server image (the proxy / orchestrator / executor binary) and
# push it to GitHub Container Registry on every push to main that touches the
# binary's sources or the Dockerfile. Tags: `latest`, a monotonic
# `0.1.<commits touching the server>` version, and `sha-<short>` for exact pinning.
#
#   docker run -p 8088:8088 -p 8787:8787 ghcr.io/gtoxlili/keyward:latest

on:
  push:
    branches: [main]
    paths:
      - "crates/keyward/**"
      - "crates/keyward-proto/**"
      - "crates/keyward-grpc/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/publish-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-server
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/gtoxlili/keyward

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          COUNT=$(git rev-list --count HEAD -- crates/keyward/ crates/keyward-proto/ crates/keyward-grpc/ Cargo.toml Cargo.lock Dockerfile)
          {
            echo "version=0.1.${COUNT}"
            echo "sha=sha-${GITHUB_SHA::12}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
